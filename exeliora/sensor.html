<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sensor - Exeliora</title>
    <link rel="stylesheet" href="Assets/css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo">
                <h2>EXELIORA</h2>
            </div>
            <nav class="nav-menu">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-th-large"></i>
                    <span>Dashboard</span>
                </a>
                <a href="sensor.html" class="nav-item active">
                    <i class="fas fa-microchip"></i>
                    <span>Sensor</span>
                </a>
                <a href="notifikasi.html" class="nav-item">
                    <i class="fas fa-bell"></i>
                    <span>Notifikasi</span>
                </a>
                <a href="pengaturan.html" class="nav-item">
                    <i class="fas fa-cog"></i>
                    <span>Pengaturan</span>
                </a>
                <a href="login.html" class="nav-item logout">
                    <i class="fas fa-sign-out-alt"></i>
                    <span>Keluar</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-header">
                <h1 id="page-title">Data Sensor</h1>
                <div class="user-info">
                    <span>Admin</span>
                    <i class="fas fa-user-circle"></i>
                </div>
            </header>

            <!-- Tampilan Awal: Pilih Sensor -->
            <div class="content-area" id="sensor-list-view">
                <div class="sensor-selection-grid">
                    <div class="sensor-selection-card" onclick="showSensorDetail('ldr')">
                        <div class="sensor-selection-icon">
                            <i class="fas fa-sun"></i>
                        </div>
                        <h2>LDR ( Cahaya )</h2>
                    </div>

                    <div class="sensor-selection-card" onclick="showSensorDetail('suhu')">
                        <div class="sensor-selection-icon">
                            <i class="fas fa-thermometer-half"></i>
                        </div>
                        <h2>DHT 11 ( Suhu )</h2>
                    </div>
                </div>
            </div>

            <!-- Tampilan Detail Sensor (Hidden by default) -->
            <div class="content-area" id="sensor-detail-view" style="display: none;">
                <!-- Sensor Suhu Section -->
                <div class="sensor-section">
                        <div class="sensor-actions">
                            <button class="btn-control" onclick="TambahSensor('suhu')">
                                <i class="fas fa-plus"></i> Tambah Sensor
                            </button>
                            <button class="btn-control" onclick="EditSensor('suhu')">
                                <i class="fas fa-plus"></i> Edit Sensor
                            </button>
                            <button class="btn-action danger" onclick="hapusSensor('suhu')">
                                <i class="fas fa-trash"></i> Hapus Sensor
                            </button>    
                        </div>
                    <div class="sensor-detail-card">
                        <div class="sensor-main-info">
                            <div class="sensor-icon-large">
                                <i class="fas fa-thermometer-half"></i>
                            </div>
                            <div class="sensor-reading">
                                <h3>Suhu Saat Ini</h3>
                                <div class="sensor-value-large">25°C</div>
                                <div class="sensor-status active">Aktif</div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Sensor Cahaya (LDR) Section -->
                <div class="sensor-section">
                        <div class="sensor-actions">
                            <button class="btn-control" onclick="TambahSensor('suhu')">
                                <i class="fas fa-plus"></i> Tambah Sensor
                            </button>
                            <button class="btn-control" onclick="EditSensor('suhu')">
                                <i class="fas fa-plus"></i> Edit Sensor
                            </button>
                            <button class="btn-action danger" onclick="hapusSensor('suhu')">
                                <i class="fas fa-trash"></i> Hapus Sensor
                            </button>    
                        </div>
                    <div class="sensor-detail-card">
                        <div class="sensor-main-info">
                            <div class="sensor-icon-large">
                                <i class="fas fa-sun"></i>
                            </div>
                            <div class="sensor-reading">
                                <h3>Garasi</h3>
                                <div class="sensor-value-large">450 Lux</div>
                                <div class="sensor-status active">Aktif</div>
                            </div>
                        </div>
                    </div>

                    <div class="sensor-detail-card">
                        <div class="sensor-main-info">
                            <div class="sensor-icon-large">
                                <i class="fas fa-sun"></i>
                            </div>
                            <div class="sensor-reading">
                                <h3>Taman</h3>
                                <div class="sensor-value-large">340 Lux</div>
                                <div class="sensor-status active">Mati</div>
                            </div>
                        </div>
                    </div>

                </div>

                <!-- Tombol Kembali -->
                <div class="back-button-container">
                    <button class="btn-back" onclick="backToSensorList()">
                        <i class="fas fa-arrow-left"></i> Kembali ke Daftar Sensor
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script src="Assets/js/sensor.js"></script>
</body>
</html>
